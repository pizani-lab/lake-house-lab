services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lakehouse
      POSTGRES_USER: lakehouse
      POSTGRES_PASSWORD: lakehouse
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5403:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6403:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - ./dbt_project:/app/dbt_project
      - ./data:/data
    ports:
      - "8003:8000"
    env_file: .env
    depends_on:
      - db
      - redis

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=2
    volumes:
      - ./backend:/app
      - ./dbt_project:/app/dbt_project
      - ./data:/data
    env_file: .env
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5103:5173"
    depends_on:
      - backend

volumes:
  pgdata:
